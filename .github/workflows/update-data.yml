name: Update data and release

on:
  schedule:
    # Every Sunday at 02:00 UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.SYNC_L10N_APP_ID }}
          private-key: ${{ secrets.SYNC_L10N_APP_PRIVATE_KEY }}
          owner: MahoCommerce

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          token: ${{ steps.generate_token.outputs.token }}
          fetch-depth: 0

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 'latest'
          extensions: intl, mbstring, json
          coverage: none

      - name: Install dependencies
        run: composer install --optimize-autoloader

      - name: Generate libaddressinput formats data
        run: php generate-formats.php

      - name: Generate countries + regions data
        run: php generate.php

      - name: Validate generated data
        run: php validate.php

      - name: Detect changes
        id: changes
        run: |
          git add -A countries.json regions/ formats/
          if git diff --cached --quiet; then
            echo "No changes detected"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "Changes detected"
            echo "has_changes=true" >> $GITHUB_OUTPUT
            echo "Files changed:"
            git diff --cached --name-status
          fi

      - name: Compute next version tag
        if: steps.changes.outputs.has_changes == 'true'
        id: version
        run: |
          TODAY=$(date -u +'%Y%m%d')
          LATEST=$(git tag --list '[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n1)
          if [ -z "$LATEST" ]; then
            MAJOR=1
            MINOR=0
          else
            MAJOR=$(echo "$LATEST" | cut -d. -f1)
            MINOR=$(echo "$LATEST" | cut -d. -f2)
          fi
          NEW_TAG="${MAJOR}.${MINOR}.${TODAY}"
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            COUNTER=1
            while git rev-parse "${NEW_TAG}.${COUNTER}" >/dev/null 2>&1; do
              COUNTER=$((COUNTER + 1))
            done
            NEW_TAG="${NEW_TAG}.${COUNTER}"
          fi
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "Next tag: $NEW_TAG"

      - name: Configure git identity
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "maho-data-bot"
          git config user.email "bot@mahocommerce.com"

      - name: Commit, tag, and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git commit -m "Update data — ${{ steps.version.outputs.new_tag }}"
          git tag -a "${{ steps.version.outputs.new_tag }}" -m "Automated data snapshot ${{ steps.version.outputs.new_tag }}"
          git push origin HEAD
          git push origin "${{ steps.version.outputs.new_tag }}"

      - name: Create GitHub release
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ steps.generate_token.outputs.token }}
        run: |
          gh release create "${{ steps.version.outputs.new_tag }}" \
            --title "${{ steps.version.outputs.new_tag }}" \
            --notes "Automated upstream data refresh. See commit diff for details."

      - name: Output result
        run: |
          if [ "${{ steps.changes.outputs.has_changes }}" == "true" ]; then
            echo "Released ${{ steps.version.outputs.new_tag }}"
          else
            echo "No changes — nothing to release."
          fi
